<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabla</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f7fb;
      margin: 40px;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
    }

    table {
      width: 60%;
      margin: 20px auto;
      border-collapse: collapse;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
    }

    thead {
      background-color: #3498db;
      color: #fff;
    }

    th,
    td {
      padding: 12px 15px;
      text-align: center;
    }

    tbody tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    tbody tr:hover {
      background-color: #dff0ff;
      cursor: pointer;
    }

    tfoot {
      background-color: #ecf0f1;
      font-weight: bold;
    }

    tfoot td {
      text-align: right;
      color: #2c3e50;
      padding-right: 20px;
    }
  </style>
</head>
<body>
  <h1>Tabla de Estudiantes</h1>
  <table>
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Edad</th>
        <th>Carrera</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Ignacio</td>
        <td>22</td>
        <td>Ingeniería</td>
      </tr>
      <tr>
        <td>Rebeca</td>
        <td>23</td>
        <td>Sistemas</td>
      </tr>
      <tr>
        <td>Lionel</td>
        <td>21</td>
        <td>Arquitectura</td>
      </tr>
    </tbody>
    <tfoot>
      <tr>
        <td colspan="3">Total de estudiantes: 3</td>
      </tr>
    </tfoot>
  </table>
</body>
</html>
