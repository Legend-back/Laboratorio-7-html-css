<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto Destacado</title>
  <link rel="stylesheet" href="card-styles.css">
</head>
<body>
  <main class="page">
    <h1 class="titulo">Producto Destacado</h1>
    <article class="card">
      <img class="thumb" src="iphone.png" alt="Producto">
      <div class="card-body">
        <h2>Nombre del Producto</h2>
        <p class="desc">Descripción breve del producto. Es muy útil para mostrar sus características.</p>
        <div class="price">$25.99</div>
        <button class="buy">Comprar</button>
      </div>
    </article>
  </main>
</body>
</html>
